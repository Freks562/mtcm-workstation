<!doctype html><html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Ops Wallboard</title>
<style>body{background:#0b1220;color:#e5e7eb;font-family:system-ui}.wrap{max-width:900px;margin:24px auto;padding:0 16px}.card{background:#0007;border:1px solid #1f2a44;border-radius:16px;padding:16px;margin:12px 0}
input{background:#0b1220;color:#e5e7eb;border:1px solid #2b3b5f;border-radius:10px;padding:8px;width:100%;box-sizing:border-box;margin-bottom:12px} button{background:#0b1220;color:#CFAE2A;border:1px solid #2b3b5f;border-radius:10px;padding:8px 12px}</style>
</head><body><div class="wrap">
  <h2>Ops Wallboard</h2>
  <div class="card">
    <label>Token</label>
    <input id="tok" placeholder="paste token from Admin → Rotate Ops Token"/>
    <button id="go">Check</button>
    <pre id="out" style="white-space:pre-wrap;margin-top:12px"></pre>
  </div>
  <a href="/">← Home</a>
</div>
<script>
document.getElementById('go').onclick=async()=>{ const t=document.getElementById('tok').value.trim(); const r=await fetch('/api/ops/status?token='+encodeURIComponent(t)); const j=await r.json(); document.getElementById('out').textContent = JSON.stringify(j,null,2); };
</script>
</body></html>
