services:
  - type: web
    name: mtcm-portal
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install
    startCommand: node server/app.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: ALLOWED_EMAILS
        sync: false
