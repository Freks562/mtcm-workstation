# Fly.io configuration
# https://fly.io/docs/reference/configuration/

app = "mtcm-portal"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  SESSION_SECURE = "1"
  WEATHER_DEFAULT_CITY = "Washington DC"
  WEATHER_DEFAULT_UNITS = "metric"
  WEATHER_ALERT_PRECIP_MM = "10"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
